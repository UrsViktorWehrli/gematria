<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gematria – Zahlencode der Wörter</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=Crimson+Pro:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --gold: #c9a84c;
    --gold-light: #e8c97a;
    --deep: #0a0812;
    --purple: #1a0f2e;
    --ink: #120d1f;
    --text: #d4c9b0;
    --dim: #7a6e5a;
  }

  body {
    background: var(--deep);
    color: var(--text);
    font-family: 'Crimson Pro', serif;
    min-height: 100vh;
    overflow-x: hidden;
    position: relative;
  }

  /* Starfield */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      radial-gradient(1px 1px at 10% 15%, rgba(201,168,76,0.4) 0%, transparent 100%),
      radial-gradient(1px 1px at 25% 40%, rgba(201,168,76,0.25) 0%, transparent 100%),
      radial-gradient(1px 1px at 60% 10%, rgba(201,168,76,0.35) 0%, transparent 100%),
      radial-gradient(1px 1px at 80% 55%, rgba(201,168,76,0.2) 0%, transparent 100%),
      radial-gradient(1px 1px at 45% 80%, rgba(201,168,76,0.3) 0%, transparent 100%),
      radial-gradient(1px 1px at 90% 25%, rgba(201,168,76,0.4) 0%, transparent 100%),
      radial-gradient(1px 1px at 15% 70%, rgba(201,168,76,0.2) 0%, transparent 100%),
      radial-gradient(1px 1px at 70% 90%, rgba(201,168,76,0.3) 0%, transparent 100%),
      radial-gradient(2px 2px at 35% 60%, rgba(201,168,76,0.15) 0%, transparent 100%),
      radial-gradient(2px 2px at 55% 35%, rgba(201,168,76,0.2) 0%, transparent 100%);
    pointer-events: none;
    z-index: 0;
  }

  /* Radial glow center */
  body::after {
    content: '';
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 600px;
    height: 600px;
    background: radial-gradient(ellipse, rgba(26,15,46,0.8) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  .container {
    max-width: 760px;
    margin: 0 auto;
    padding: 3rem 2rem 4rem;
    position: relative;
    z-index: 1;
  }

  header {
    text-align: center;
    margin-bottom: 3rem;
  }

  .eye-of-god {
    width: 60px;
    height: 40px;
    margin: 0 auto 1.5rem;
    position: relative;
  }

  .eye-of-god svg {
    width: 100%;
    height: 100%;
    filter: drop-shadow(0 0 8px rgba(201,168,76,0.6));
  }

  h1 {
    font-family: 'Cinzel Decorative', serif;
    font-size: clamp(1.6rem, 4vw, 2.4rem);
    font-weight: 700;
    color: var(--gold);
    letter-spacing: 0.15em;
    text-shadow: 0 0 30px rgba(201,168,76,0.4);
    margin-bottom: 0.5rem;
  }

  .subtitle {
    font-style: italic;
    color: var(--dim);
    font-size: 1rem;
    letter-spacing: 0.05em;
  }

  /* Decorative divider */
  .divider {
    display: flex;
    align-items: center;
    gap: 1rem;
    margin: 2rem 0;
  }
  .divider::before, .divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: linear-gradient(to right, transparent, var(--gold), transparent);
    opacity: 0.4;
  }
  .divider-symbol {
    color: var(--gold);
    font-size: 1rem;
    opacity: 0.7;
  }

  /* Input area */
  .input-section {
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(201,168,76,0.2);
    border-radius: 4px;
    padding: 2rem;
    margin-bottom: 2rem;
    position: relative;
  }

  .input-section::before {
    content: '';
    position: absolute;
    inset: -1px;
    border-radius: 4px;
    background: linear-gradient(135deg, rgba(201,168,76,0.15), transparent 50%, rgba(201,168,76,0.05));
    pointer-events: none;
  }

  label {
    display: block;
    font-family: 'Cinzel Decorative', serif;
    font-size: 0.65rem;
    letter-spacing: 0.2em;
    color: var(--gold);
    margin-bottom: 0.75rem;
    text-transform: uppercase;
  }

  .input-row {
    display: flex;
    gap: 0.75rem;
  }

  input[type="text"] {
    flex: 1;
    background: rgba(0,0,0,0.4);
    border: 1px solid rgba(201,168,76,0.3);
    border-radius: 3px;
    padding: 0.85rem 1.2rem;
    color: var(--text);
    font-family: 'Crimson Pro', serif;
    font-size: 1.15rem;
    outline: none;
    transition: border-color 0.3s, box-shadow 0.3s;
  }

  input[type="text"]:focus {
    border-color: var(--gold);
    box-shadow: 0 0 15px rgba(201,168,76,0.15);
  }

  input[type="text"]::placeholder {
    color: var(--dim);
    font-style: italic;
  }

  button {
    background: linear-gradient(135deg, rgba(201,168,76,0.2), rgba(201,168,76,0.1));
    border: 1px solid rgba(201,168,76,0.5);
    border-radius: 3px;
    color: var(--gold-light);
    font-family: 'Cinzel Decorative', serif;
    font-size: 0.6rem;
    letter-spacing: 0.15em;
    padding: 0.85rem 1.5rem;
    cursor: pointer;
    transition: all 0.3s;
    text-transform: uppercase;
    white-space: nowrap;
  }

  button:hover {
    background: linear-gradient(135deg, rgba(201,168,76,0.35), rgba(201,168,76,0.2));
    box-shadow: 0 0 20px rgba(201,168,76,0.2);
    transform: translateY(-1px);
  }

  button:active { transform: translateY(0); }

  /* Method tabs */
  .method-tabs {
    display: flex;
    gap: 0.5rem;
    margin-bottom: 2rem;
    flex-wrap: wrap;
  }

  .tab {
    background: transparent;
    border: 1px solid rgba(201,168,76,0.2);
    border-radius: 2px;
    color: var(--dim);
    font-family: 'Cinzel Decorative', serif;
    font-size: 0.55rem;
    letter-spacing: 0.12em;
    padding: 0.5rem 1rem;
    cursor: pointer;
    transition: all 0.25s;
    text-transform: uppercase;
  }

  .tab.active, .tab:hover {
    border-color: var(--gold);
    color: var(--gold-light);
    background: rgba(201,168,76,0.08);
  }

  /* Results */
  .results {
    display: none;
    animation: fadeUp 0.5s ease;
  }

  .results.visible { display: block; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .result-card {
    background: rgba(255,255,255,0.025);
    border: 1px solid rgba(201,168,76,0.15);
    border-radius: 4px;
    padding: 2rem;
    margin-bottom: 1.5rem;
    position: relative;
    overflow: hidden;
  }

  .result-card::after {
    content: '';
    position: absolute;
    top: 0; right: 0;
    width: 80px; height: 80px;
    background: radial-gradient(circle at top right, rgba(201,168,76,0.06), transparent);
    pointer-events: none;
  }

  .method-name {
    font-family: 'Cinzel Decorative', serif;
    font-size: 0.6rem;
    letter-spacing: 0.2em;
    color: var(--gold);
    text-transform: uppercase;
    margin-bottom: 1.2rem;
    opacity: 0.8;
  }

  .letter-breakdown {
    display: flex;
    flex-wrap: wrap;
    gap: 0.5rem;
    margin-bottom: 1.5rem;
  }

  .letter-cell {
    display: flex;
    flex-direction: column;
    align-items: center;
    background: rgba(0,0,0,0.3);
    border: 1px solid rgba(201,168,76,0.15);
    border-radius: 3px;
    padding: 0.5rem 0.7rem;
    min-width: 42px;
  }

  .letter-char {
    font-size: 1.2rem;
    color: var(--gold-light);
    font-weight: 300;
    line-height: 1;
    margin-bottom: 0.3rem;
  }

  .letter-val {
    font-size: 0.75rem;
    color: var(--dim);
  }

  .total-line {
    display: flex;
    align-items: baseline;
    gap: 1rem;
    padding-top: 1rem;
    border-top: 1px solid rgba(201,168,76,0.1);
  }

  .total-label {
    font-style: italic;
    color: var(--dim);
    font-size: 0.95rem;
  }

  .total-number {
    font-family: 'Cinzel Decorative', serif;
    font-size: 2.5rem;
    color: var(--gold);
    text-shadow: 0 0 20px rgba(201,168,76,0.4);
    line-height: 1;
  }

  .hebrew-display {
    font-size: 1.8rem;
    color: var(--gold-light);
    letter-spacing: 0.1em;
    direction: rtl;
    margin-bottom: 0.5rem;
  }

  /* AI insight */
  .ai-section {
    background: rgba(26,15,46,0.6);
    border: 1px solid rgba(201,168,76,0.1);
    border-radius: 4px;
    padding: 1.5rem 2rem;
    margin-top: 1.5rem;
  }

  .ai-section .method-name {
    margin-bottom: 0.75rem;
  }

  .ai-text {
    font-size: 1rem;
    line-height: 1.7;
    color: var(--text);
    font-style: italic;
  }

  .ai-loading {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    color: var(--dim);
    font-style: italic;
  }

  .dots span {
    display: inline-block;
    animation: blink 1.2s infinite;
    font-size: 1.5rem;
    line-height: 0;
    vertical-align: middle;
  }
  .dots span:nth-child(2) { animation-delay: 0.2s; }
  .dots span:nth-child(3) { animation-delay: 0.4s; }

  @keyframes blink {
    0%, 80%, 100% { opacity: 0.2; }
    40% { opacity: 1; }
  }

  /* Error */
  .error-msg {
    color: #c06060;
    font-style: italic;
    font-size: 0.9rem;
    margin-top: 0.5rem;
  }

  /* Footer */
  footer {
    text-align: center;
    margin-top: 3rem;
    color: var(--dim);
    font-size: 0.85rem;
    font-style: italic;
    opacity: 0.5;
  }
</style>
</head>
<body>
<div class="container">

  <header>
    <!-- Eye of Providence SVG -->
    <div class="eye-of-god">
      <svg viewBox="0 0 100 65" fill="none" xmlns="http://www.w3.org/2000/svg">
        <ellipse cx="50" cy="32" rx="45" ry="28" stroke="#c9a84c" stroke-width="1.5" opacity="0.6"/>
        <ellipse cx="50" cy="32" rx="45" ry="28" fill="none" stroke="url(#glow)" stroke-width="0.5"/>
        <circle cx="50" cy="32" r="12" fill="none" stroke="#c9a84c" stroke-width="1.5" opacity="0.8"/>
        <circle cx="50" cy="32" r="5" fill="#c9a84c" opacity="0.7"/>
        <circle cx="47" cy="29" r="2" fill="#e8c97a" opacity="0.5"/>
        <!-- lashes -->
        <line x1="50" y1="4" x2="50" y2="12" stroke="#c9a84c" stroke-width="1" opacity="0.4"/>
        <line x1="30" y1="8" x2="34" y2="15" stroke="#c9a84c" stroke-width="1" opacity="0.3"/>
        <line x1="70" y1="8" x2="66" y2="15" stroke="#c9a84c" stroke-width="1" opacity="0.3"/>
        <defs>
          <linearGradient id="glow" x1="0" y1="0" x2="100" y2="0">
            <stop offset="0%" stop-color="#c9a84c" stop-opacity="0"/>
            <stop offset="50%" stop-color="#c9a84c" stop-opacity="0.8"/>
            <stop offset="100%" stop-color="#c9a84c" stop-opacity="0"/>
          </linearGradient>
        </defs>
      </svg>
    </div>
    <h1>Gematria</h1>
    <p class="subtitle">Der Zahlencode verborgener Wörter</p>
  </header>

  <div class="divider"><span class="divider-symbol">✦</span></div>

  <div class="input-section">
    <label>Wort oder Satz eingeben</label>
    <div class="input-row">
      <input type="text" id="wordInput" placeholder="z. B. Graphene, Liebe, Basel …" />
      <button onclick="calculate()">Berechnen</button>
    </div>
    <div id="errorMsg" class="error-msg" style="display:none"></div>
  </div>

  <div id="results" class="results">

    <!-- English Gematria -->
    <div class="result-card" id="card-en">
      <div class="method-name">✦ Englische Gematria (A=1 … Z=26)</div>
      <div class="letter-breakdown" id="breakdown-en"></div>
      <div class="total-line">
        <span class="total-label">Zahlenwert:</span>
        <span class="total-number" id="total-en"></span>
      </div>
    </div>

    <!-- Hebrew -->
    <div class="result-card" id="card-he">
      <div class="method-name">✦ Hebräische Gematria (Umschrift)</div>
      <div class="hebrew-display" id="hebrew-word"></div>
      <div class="letter-breakdown" id="breakdown-he"></div>
      <div class="total-line">
        <span class="total-label">Zahlenwert:</span>
        <span class="total-number" id="total-he"></span>
      </div>
    </div>

    <!-- Greek -->
    <div class="result-card" id="card-gr">
      <div class="method-name">✦ Griechische Isopsephy</div>
      <div class="letter-breakdown" id="breakdown-gr"></div>
      <div class="total-line">
        <span class="total-label">Zahlenwert:</span>
        <span class="total-number" id="total-gr"></span>
      </div>
    </div>

    <div class="divider"><span class="divider-symbol">✦</span></div>

    <!-- AI Insight -->
    <div class="ai-section">
      <div class="method-name">✦ Kabbalistische Deutung (KI)</div>
      <div id="aiInsight" class="ai-text">
        <div class="ai-loading">
          Weise Geister befragen<span class="dots"><span>.</span><span>.</span><span>.</span></span>
        </div>
      </div>
    </div>

  </div>

  <footer>
    In Zahlen liegt das Wesen aller Dinge — Pythagoras
  </footer>

</div>

<script>
// ─── English Gematria ───────────────────────────────────────────────────────
function englishGematria(word) {
  const clean = word.toUpperCase().replace(/[^A-Z]/g, '');
  let total = 0;
  const cells = [];
  for (const ch of clean) {
    const val = ch.charCodeAt(0) - 64;
    total += val;
    cells.push({ char: ch, val });
  }
  return { total, cells };
}

// ─── Hebrew transliteration map ────────────────────────────────────────────
const hebrewMap = {
  'A': { heb: 'א', val: 1 },  'B': { heb: 'ב', val: 2 },
  'G': { heb: 'ג', val: 3 },  'D': { heb: 'ד', val: 4 },
  'H': { heb: 'ה', val: 5 },  'V': { heb: 'ו', val: 6 },
  'Z': { heb: 'ז', val: 7 },  'X': { heb: 'ח', val: 8 },
  'T': { heb: 'ט', val: 9 },  'Y': { heb: 'י', val: 10 },
  'K': { heb: 'כ', val: 20 }, 'L': { heb: 'ל', val: 30 },
  'M': { heb: 'מ', val: 40 }, 'N': { heb: 'נ', val: 50 },
  'S': { heb: 'ס', val: 60 }, 'O': { heb: 'ע', val: 70 },
  'P': { heb: 'פ', val: 80 }, 'Q': { heb: 'צ', val: 90 },
  'R': { heb: 'ר', val: 200 },'W': { heb: 'ש', val: 300 },
  'F': { heb: 'ת', val: 400 },
  // fallbacks for unmapped letters
  'C': { heb: 'כ', val: 20 }, 'E': { heb: 'ה', val: 5 },
  'I': { heb: 'י', val: 10 }, 'J': { heb: 'י', val: 10 },
  'U': { heb: 'ו', val: 6 },
};

function hebrewGematria(word) {
  const clean = word.toUpperCase().replace(/[^A-Z]/g, '');
  let total = 0;
  const cells = [];
  let hebrewWord = '';
  for (const ch of clean) {
    const entry = hebrewMap[ch] || { heb: ch, val: 0 };
    total += entry.val;
    hebrewWord += entry.heb;
    cells.push({ char: entry.heb, val: entry.val, orig: ch });
  }
  return { total, cells, hebrewWord };
}

// ─── Greek Isopsephy ────────────────────────────────────────────────────────
const greekMap = {
  'A': { gk: 'Α', val: 1 },  'B': { gk: 'Β', val: 2 },
  'G': { gk: 'Γ', val: 3 },  'D': { gk: 'Δ', val: 4 },
  'E': { gk: 'Ε', val: 5 },  'Z': { gk: 'Ζ', val: 7 },
  'H': { gk: 'Η', val: 8 },  'T': { gk: 'Θ', val: 9 },
  'I': { gk: 'Ι', val: 10 }, 'K': { gk: 'Κ', val: 20 },
  'L': { gk: 'Λ', val: 30 }, 'M': { gk: 'Μ', val: 40 },
  'N': { gk: 'Ν', val: 50 }, 'X': { gk: 'Ξ', val: 60 },
  'O': { gk: 'Ο', val: 70 }, 'P': { gk: 'Π', val: 80 },
  'R': { gk: 'Ρ', val: 100 },'S': { gk: 'Σ', val: 200 },
  'U': { gk: 'Υ', val: 400 },'F': { gk: 'Φ', val: 500 },
  'C': { gk: 'Χ', val: 600 },'Y': { gk: 'Ψ', val: 700 },
  'W': { gk: 'Ω', val: 800 },
  // fallbacks
  'J': { gk: 'Ι', val: 10 }, 'Q': { gk: 'Κ', val: 20 },
  'V': { gk: 'Β', val: 2 },
};

function greekIsopsephy(word) {
  const clean = word.toUpperCase().replace(/[^A-Z]/g, '');
  let total = 0;
  const cells = [];
  for (const ch of clean) {
    const entry = greekMap[ch] || { gk: ch, val: 0 };
    total += entry.val;
    cells.push({ char: entry.gk, val: entry.val, orig: ch });
  }
  return { total, cells };
}

// ─── Render helpers ─────────────────────────────────────────────────────────
function renderCells(containerId, cells) {
  const el = document.getElementById(containerId);
  el.innerHTML = cells.map(c =>
    `<div class="letter-cell">
      <span class="letter-char">${c.char}</span>
      <span class="letter-val">${c.val}</span>
    </div>`
  ).join('');
}

// ─── Main calculate ──────────────────────────────────────────────────────────
async function calculate() {
  const word = document.getElementById('wordInput').value.trim();
  const errEl = document.getElementById('errorMsg');

  if (!word) {
    errEl.style.display = 'block';
    errEl.textContent = 'Bitte ein Wort eingeben.';
    return;
  }
  errEl.style.display = 'none';

  const results = document.getElementById('results');
  results.classList.add('visible');

  // English
  const en = englishGematria(word);
  renderCells('breakdown-en', en.cells);
  document.getElementById('total-en').textContent = en.total;

  // Hebrew
  const he = hebrewGematria(word);
  document.getElementById('hebrew-word').textContent = he.hebrewWord;
  renderCells('breakdown-he', he.cells);
  document.getElementById('total-he').textContent = he.total;

  // Greek
  const gr = greekIsopsephy(word);
  renderCells('breakdown-gr', gr.cells);
  document.getElementById('total-gr').textContent = gr.total;

  // AI Insight
  document.getElementById('aiInsight').innerHTML =
    `<div class="ai-loading">Weise Geister befragen<span class="dots"><span>.</span><span>.</span><span>.</span></span></div>`;

  await fetchAiInsight(word, en.total, he.total, gr.total);
}

// Enter key
document.getElementById('wordInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') calculate();
});

// ─── AI Insight via Claude API ────────────────────────────────────────────────
async function fetchAiInsight(word, enVal, heVal, grVal) {
  const prompt = `Du bist ein kabbalistischer Gelehrter und Mystiker. 
Das Wort lautet: "${word}"
Englische Gematria: ${enVal}
Hebräische Gematria: ${heVal}  
Griechische Isopsephy: ${grVal}

Gib eine kurze, mystisch-poetische Deutung (3-4 Sätze) dieser Zahlenwerte. 
Erwähne bekannte Wörter oder Konzepte, die denselben Zahlenwert teilen.
Halte den Ton geheimnisvoll und weise — wie ein alter Kabbalalist.
Antworte auf Deutsch.`;

  try {
    const response = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "claude-sonnet-4-20250514",
        max_tokens: 1000,
        messages: [{ role: "user", content: prompt }]
      })
    });

    const data = await response.json();
    const text = data.content?.[0]?.text || "Die Sterne schweigen heute.";
    document.getElementById('aiInsight').innerHTML =
      `<div class="ai-text">${text.replace(/\n/g, '<br>')}</div>`;
  } catch (err) {
    document.getElementById('aiInsight').innerHTML =
      `<div class="ai-text" style="color:#c06060">Die Verbindung zu den Sphären ist unterbrochen.</div>`;
  }
}
</script>
</body>
</html>
